<section class="cv-section-doc-links" aria-labelledby="cv-section-doc-heading">
  <h3 id="cv-section-doc-heading" class="cv-section-doc-title">
    {{ 'CV_SECTION.DOC_SECTION_TITLE' | translate }}
  </h3>

  <div class="cv-section-doc-grid">
    @for (doc of documents; track doc.id) {
      <article class="cv-section-doc-card">
        <a
          class="cv-section-doc-card-link"
          [routerLink]="doc.routerLink"
          [queryParams]="doc.queryParams"
          [attr.aria-label]="doc.titleKey | translate"
        >
          <div class="cv-section-doc-image-wrap">
            <img
              class="cv-section-doc-image"
              [src]="doc.imgSrc"
              alt="{{ doc.imgAltKey | translate }}"
              title="{{ doc.titleKey | translate }}"
              loading="lazy"
            />
          </div>

          <div class="cv-section-doc-text">
            <p class="cv-section-doc-description">
              {{ doc.descriptionKey | translate }}
            </p>
          </div>
        </a>
      </article>
    }
  </div>
</section>
