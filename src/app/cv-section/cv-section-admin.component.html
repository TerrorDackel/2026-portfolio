<main class="cv-section-admin" aria-labelledby="cv-section-admin-heading">
  <section class="cv-section-admin-card">
    <button
      type="button"
      class="cv-section-logout-btn"
      (click)="onLogoutClick()"
    >
      {{ 'CV_SECTION.BUTTON_LOGOUT' | translate }}
    </button>
    <div class="cv-section-admin-border"></div>

    <div class="cv-section-admin-content">
      <h2 id="cv-section-admin-heading" class="cv-section-admin-title reveal-zoom">
        {{ 'CV_SECTION.ADMIN_TITLE' | translate }}
      </h2>

      <div class="cv-section-admin-subtitle-container">
        <p class="cv-section-admin-subtitle">
          {{ 'CV_SECTION.ADMIN_SUBTITLE' | translate }}
        </p>
      </div>

      <div class="cv-section-admin-placeholder">
        <p class="cv-section-admin-placeholder-text">
          {{ 'CV_SECTION.ADMIN_PLACEHOLDER' | translate }}
        </p>
      </div>

      <app-cv-document-links></app-cv-document-links>
    </div>
  </section>
</main>
