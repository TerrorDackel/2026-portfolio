<main class="cv-section-login-container" aria-labelledby="cv-section-login-heading">
  <section class="cv-section-card">
    <h2 id="cv-section-login-heading" class="cv-section-title reveal-zoom">
      {{ 'CV_SECTION.LOGIN_TITLE' | translate }}
    </h2>

    <div class="cv-section-subtitle-container">
      <p class="cv-section-subtitle-txt">
        {{ 'CV_SECTION.LOGIN_SUBTITLE' | translate }}
      </p>
    </div>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      novalidate
      class="cv-section-form"
      autocomplete="on"
    >
      <div class="cv-section-field">
        <label class="visually-hidden" for="cv-section-name">
          {{ 'CV_SECTION.PLACEHOLDER_NAME' | translate }}
        </label>
        <input
          type="text"
          class="cv-section-input"
          id="cv-section-name"
          formControlName="name"
          name="username"
          autocomplete="username"
          [placeholder]="'CV_SECTION.PLACEHOLDER_NAME' | translate"
        />
      </div>

      <div class="cv-section-field cv-section-password-wrapper">
        <label class="visually-hidden" for="cv-section-password">
          {{ 'CV_SECTION.PLACEHOLDER_PASSWORD' | translate }}
        </label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="cv-section-input"
          id="cv-section-password"
          formControlName="password"
          name="current-password"
          autocomplete="current-password"
          [placeholder]="'CV_SECTION.PLACEHOLDER_PASSWORD' | translate"
        />
        <button
          type="button"
          class="cv-section-toggle-password"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="
            (showPassword ? 'CV_SECTION.HIDE_PASSWORD' : 'CV_SECTION.SHOW_PASSWORD') | translate
          "
        >
          <span>
            {{ showPassword ? ('CV_SECTION.PW_VISIBLE' | translate) : ('CV_SECTION.PW_HIDDEN' | translate) }}
          </span>
        </button>
      </div>

      @if (showInlineError && inlineErrorKey) {
        <div class="cv-section-error-toast">
          <span class="cv-section-error-text">
            {{ inlineErrorKey | translate }}
          </span>
        </div>
      }

      @if (showInactivityWarning) {
        <div class="cv-section-warning-toast">
          <span class="cv-section-warning-text">
            {{ 'CV_SECTION.SESSION_WARNING' | translate }}
          </span>
        </div>
      }

      <div class="cv-section-button-container">
        <button
          type="submit"
          class="cv-section-btn"
          [class.cv-section-btn-valid]="loginForm.valid && !isSubmitting"
          [disabled]="!loginForm.valid || isSubmitting"
        >
          {{ 'CV_SECTION.BUTTON_LOGIN' | translate }}
        </button>
      </div>
    </form>
  </section>
</main>
